global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: logflow-production
    region: us-east-1

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "logflow-api-gateway"
    static_configs:
      - targets: ["logflow-api-gateway:9090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "logflow-ingestion"
    static_configs:
      - targets: ["logflow-ingestion-service:9091"]

  - job_name: "logflow-search"
    static_configs:
      - targets: ["logflow-search-service:9092"]

  - job_name: "logflow-websocket"
    static_configs:
      - targets: ["logflow-websocket-service:9093"]

  - job_name: "logflow-consumer"
    static_configs:
      - targets: ["logflow-kafka-consumer:9095"]

  - job_name: "kafka"
    static_configs:
      - targets: ["logflow-kafka:9308"]

  - job_name: "clickhouse"
    static_configs:
      - targets: ["logflow-clickhouse:9363"]

  - job_name: "redis"
    static_configs:
      - targets: ["logflow-redis-master:9121"]

  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["logflow"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
