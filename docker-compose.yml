version: "3.9"

# ── LogFlow local development stack ──────────────────────────────────────────
# Brings up all infrastructure services + the platform microservices.
# Tuned for a developer laptop — NOT for production load.

x-common: &common
  restart: unless-stopped
  networks:
    - logflow

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    <<: *common
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *common
    image: confluentinc/cp-kafka:7.6.0
    container_name: logflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - logflow
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic logs-raw --partitions 12 --replication-factor 1 \
        --config retention.ms=86400000 --config compression.type=zstd
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic logs-processed --partitions 12 --replication-factor 1 \
        --config retention.ms=86400000
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic logs-dlq --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000
      echo 'Kafka topics created.'
      "
    restart: "no"

  clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: logflow-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native binary
    environment:
      CLICKHOUSE_DB: logflow
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/clickhouse_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./scripts/clickhouse_config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *common
    image: redis:7.2-alpine
    container_name: logflow-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --hz 20
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Platform Services ──────────────────────────────────────────────────────

  auth-service:
    <<: *common
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      args:
        SERVICE: auth-service
    container_name: logflow-auth
    ports:
      - "8084:8084"
    environment:
      ENV: development
      PORT: "8084"
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      METRICS_PORT: "9094"
    healthcheck:
      test: ["CMD", "/service", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    <<: *common
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        SERVICE: api-gateway
    container_name: logflow-gateway
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8080"
      METRICS_PORT: "9090"
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      INGESTION_SERVICE_URL: http://ingestion-service:8081
      SEARCH_SERVICE_URL: http://search-service:8082
      WEBSOCKET_SERVICE_URL: http://websocket-service:8083
      AUTH_SERVICE_URL: http://auth-service:8084
      RATE_LIMIT_RPS: "10000"
      ALLOWED_ORIGINS: "http://localhost:3000"

  ingestion-service:
    <<: *common
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile
      args:
        SERVICE: ingestion-service
    container_name: logflow-ingestion
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8081"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: logs-raw
      KAFKA_BATCH_SIZE: "5000"
      KAFKA_BATCH_TIMEOUT_MS: "10"
      PRODUCER_CHANNEL_BUFFER: "100000"

  search-service:
    <<: *common
    build:
      context: .
      dockerfile: search-service/Dockerfile
      args:
        SERVICE: search-service
    container_name: logflow-search
    ports:
      - "8082:8082"
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8082"
      CLICKHOUSE_HOSTS: clickhouse:9000
      CLICKHOUSE_DB: logflow
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      REDIS_ADDR: redis:6379
      CACHE_TTL_SECONDS: "30"

  kafka-consumer:
    <<: *common
    build:
      context: .
      dockerfile: kafka-consumer/Dockerfile
      args:
        SERVICE: kafka-consumer
    container_name: logflow-consumer
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      ENV: development
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: logs-raw
      KAFKA_GROUP_ID: logflow-consumer-group
      KAFKA_DLQ_TOPIC: logs-dlq
      CONSUMER_WORKERS: "4"
      CONSUMER_BATCH_SIZE: "2000"
      CONSUMER_BATCH_TIMEOUT_MS: "500"
      CLICKHOUSE_HOSTS: clickhouse:9000
      CLICKHOUSE_DB: logflow
      CLICKHOUSE_USER: default

  websocket-service:
    <<: *common
    build:
      context: .
      dockerfile: websocket-service/Dockerfile
      args:
        SERVICE: websocket-service
    container_name: logflow-ws
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8083"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: logs-raw
      KAFKA_GROUP_ID: logflow-ws-consumer

  # ─── Observability ──────────────────────────────────────────────────────────

  prometheus:
    <<: *common
    image: prom/prometheus:v2.51.0
    container_name: logflow-prometheus
    ports:
      - "9099:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  grafana:
    <<: *common
    image: grafana/grafana:10.3.0
    container_name: logflow-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/logflow.json
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  jaeger:
    <<: *common
    image: jaegertracing/all-in-one:1.56
    container_name: logflow-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "true"

volumes:
  zookeeper-data:
  kafka-data:
  clickhouse-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  logflow:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
